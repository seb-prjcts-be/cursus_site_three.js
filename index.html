<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=handleiding/">
    <title>three.js Handleiding</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Oswald:wght@300&family=Alegreya:wght@400&display=swap">
    <style>
        :root {
            --text-color: #000000;
            --bg-color: #ffffff;
            --p5-pink: rgb(255, 0, 125);
        }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: var(--bg-color);
            color: var(--text-color);
            font-family: 'Alegreya', Georgia, serif;
        }
        .doorverwijzing {
            border: 2px solid var(--text-color);
            padding: 2rem 2.5rem;
            text-align: center;
        }
        h1 {
            font-family: 'Oswald', Arial, sans-serif;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 1.4rem;
            margin: 0 0 0.75rem;
        }
        a { color: var(--p5-pink); }
    </style>
</head>
<body>
    <div class="doorverwijzing">
        <h1>three.js Handleiding</h1>
        <p>Je wordt doorgestuurd... <br>Gebeurt er niets? <a href="handleiding/">Klik hier</a>.</p>
    </div>
</body>
</html>
